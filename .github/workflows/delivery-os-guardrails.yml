name: Delivery OS Guardrails

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]
  issues:
    types: [opened, edited, reopened, labeled, unlabeled]

jobs:
  pr_guardrails:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const labels = (context.payload.pull_request.labels || []).map(label => label.name);
            const modeLabels = ['flash-launch', 'product-iteration', 'legacy-maintenance'];
            const errors = [];

            if (!labels.some(label => modeLabels.includes(label))) {
              errors.push('PR must include one mode label: flash-launch, product-iteration, or legacy-maintenance.');
            }

            const requiredPatterns = [
              { name: 'Mode', regex: /^-\s*Mode:\s*\S+/m },
              { name: 'Why', regex: /^-\s*Why:\s*\S+/m },
              { name: 'Scope', regex: /^-\s*Scope:\s*\S+/m },
              { name: 'Risk level', regex: /^-\s*Risk level:\s*\S+/m },
            ];

            for (const required of requiredPatterns) {
              if (!required.regex.test(body)) {
                errors.push(`PR body is missing required field: ${required.name}.`);
              }
            }

            if (errors.length > 0) {
              core.setFailed(errors.join('\n'));
            }

  issue_guardrails:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const issue = context.payload.issue;
            const labels = (issue.labels || []).map(label => label.name);
            const modePriority = ['legacy-maintenance', 'product-iteration', 'flash-launch'];
            const matchedModeLabel = modePriority.find(label => labels.includes(label));
            const kickoffMarker = '<!-- delivery-os-kickoff -->';
            const checklistMarker = '<!-- delivery-os-checklist -->';
            const modeDisplay = {
              'flash-launch': 'Flash Launch',
              'product-iteration': 'Product Iteration',
              'legacy-maintenance': 'Legacy Maintenance',
            };
            const requiredArtifacts = {
              'flash-launch': ['idea-brief', 'PRD', 'design-spec', 'implementation-plan', 'release-checklist'],
              'product-iteration': ['project-profile', 'PRD', 'design-spec', 'implementation-plan', 'task-breakdown', 'release-checklist', 'iteration-log'],
              'legacy-maintenance': ['project-profile', 'system-map', 'implementation-plan', 'task-breakdown', 'release-checklist'],
            };
            const optionalArtifacts = {
              'flash-launch': ['task-breakdown', 'iteration-log'],
              'product-iteration': ['idea-brief', 'system-map'],
              'legacy-maintenance': ['PRD', 'design-spec', 'iteration-log'],
            };
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100,
            });
            const existingKickoff = comments.find(comment =>
              comment.user?.type === 'Bot'
              && comment.body?.includes(kickoffMarker),
            );
            const existingChecklist = comments.find(comment =>
              comment.user?.type === 'Bot'
              && comment.body?.includes(checklistMarker),
            );

            function getCheckedSet(body) {
              const checked = new Set();
              for (const match of body.matchAll(/- \[x\] `([^`]+)`/g)) {
                checked.add(match[1]);
              }
              return checked;
            }

            function buildChecklistBody(modeLabel, previousBody = '') {
              const checked = getCheckedSet(previousBody);
              const required = requiredArtifacts[modeLabel] || [];
              const optional = optionalArtifacts[modeLabel] || [];

              const requiredLines = required.map(name => {
                const mark = checked.has(name) ? 'x' : ' ';
                return `- [${mark}] \`${name}\``;
              });

              const optionalLines = optional.map(name => {
                const mark = checked.has(name) ? 'x' : ' ';
                return `- [${mark}] \`${name}\``;
              });

              return [
                checklistMarker,
                `Delivery OS checklist for \`${modeDisplay[modeLabel]}\``,
                '',
                'Required artifacts:',
                ...requiredLines,
                '',
                'Optional artifacts:',
                ...optionalLines,
                '',
                'Update this checklist comment as the issue progresses. Existing checked items are preserved when labels change.',
              ].join('\n');
            }

            let body = '';

            if (!matchedModeLabel) {
              body = [
                kickoffMarker,
                'This issue is missing a Delivery OS mode label.',
                '',
                'Add one of these labels before implementation:',
                '- `flash-launch`',
                '- `product-iteration`',
                '- `legacy-maintenance`',
              ].join('\n');
            }
            else {
              const command = `pnpm kickoff:issue -- --repo ${context.repo.owner}/${context.repo.repo} --issue ${issue.number}`;
              body = [
                kickoffMarker,
                `Mode label detected: \`${matchedModeLabel}\``,
                '',
                'Use this command to generate the workspace for this issue:',
                '```bash',
                command,
                '```',
                'If you need to overwrite an existing workspace, append `--force`.',
              ].join('\n');
            }

            if (existingKickoff) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingKickoff.id,
                body,
              });
            }
            else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body,
              });
            }

            if (!matchedModeLabel) {
              return;
            }

            const checklistBody = buildChecklistBody(matchedModeLabel, existingChecklist?.body || '');

            if (existingChecklist) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingChecklist.id,
                body: checklistBody,
              });
            }
            else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: checklistBody,
              });
            }
