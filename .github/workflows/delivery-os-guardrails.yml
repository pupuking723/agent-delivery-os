name: Delivery OS Guardrails

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled, closed]
  issues:
    types: [opened, edited, reopened, labeled, unlabeled]

jobs:
  pr_guardrails:
    if: github.event_name == 'pull_request_target' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const labels = (context.payload.pull_request.labels || []).map(label => label.name);
            const modeLabels = ['flash-launch', 'product-iteration', 'legacy-maintenance'];
            const errors = [];

            if (!labels.some(label => modeLabels.includes(label))) {
              errors.push('PR must include one mode label: flash-launch, product-iteration, or legacy-maintenance.');
            }

            const requiredPatterns = [
              { name: 'Mode', regex: /^-\s*Mode:\s*\S+/m },
              { name: 'Why', regex: /^-\s*Why:\s*\S+/m },
              { name: 'Scope', regex: /^-\s*Scope:\s*\S+/m },
              { name: 'Workspace', regex: /^-\s*Workspace:\s*(workspace\/\S+|examples\/\S+|\S+)/m },
              { name: 'Artifact paths', regex: /^-\s*Artifact paths:\s*(workspace\/\S+|examples\/\S+|docs\/\S+|\S+)/m },
              { name: 'Risk level', regex: /^-\s*Risk level:\s*\S+/m },
            ];

            for (const required of requiredPatterns) {
              if (!required.regex.test(body)) {
                errors.push(`PR body is missing required field: ${required.name}.`);
              }
            }

            if (errors.length > 0) {
              core.setFailed(errors.join('\n'));
            }

  post_merge_followup:
    if: github.event_name == 'pull_request_target' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = (pr.labels || []).map(label => label.name);
            const modePriority = ['legacy-maintenance', 'product-iteration', 'flash-launch'];
            const matchedModeLabel = modePriority.find(label => labels.includes(label));

            if (!matchedModeLabel) {
              return;
            }

            const modeDisplay = {
              'flash-launch': 'Flash Launch',
              'product-iteration': 'Product Iteration',
              'legacy-maintenance': 'Legacy Maintenance',
            };
            const iterationRequired = new Set(['flash-launch', 'product-iteration']);
            const marker = '<!-- delivery-os-iteration-reminder -->';
            const checklistMarker = '<!-- delivery-os-checklist -->';

            function inferArtifactsFromPrBody(body = '') {
              const match = body.match(/^-\\s*Artifact paths:\\s*(.+)$/m);
              if (!match) {
                return new Set();
              }

              const rawPaths = match[1]
                .split(',')
                .map(item => item.trim())
                .filter(Boolean);

              const inferred = new Set();
              for (const path of rawPaths) {
                const fileName = path.split('/').pop() || '';
                const artifactName = fileName.replace(/\\.md$/i, '');
                if (!artifactName) {
                  continue;
                }

                if (artifactName.toLowerCase() === 'prd') {
                  inferred.add('PRD');
                }
                else {
                  inferred.add(artifactName);
                }
              }

              return inferred;
            }

            function mergeChecklistBody(previousBody = '', inferredArtifacts) {
              return previousBody.replace(/- \\[( |x)\\] `([^`]+)`/g, (_, mark, artifactName) => {
                if (mark === 'x' || inferredArtifacts.has(artifactName)) {
                  return `- [x] \`${artifactName}\``;
                }
                return `- [ ] \`${artifactName}\``;
              });
            }

            const prBody = [
              marker,
              `Merged under \`${modeDisplay[matchedModeLabel]}\`.`,
              '',
              'Post-merge follow-up:',
              iterationRequired.has(matchedModeLabel)
                ? '- Update `iteration-log.md` with shipped change, results, and next action.'
                : '- If this change shipped or affected runtime behavior, update `iteration-log.md`.',
              '- Verify release notes, metrics, and rollback status if applicable.',
            ].join('\n');

            const prComments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const existingPrComment = prComments.find(comment =>
              comment.user?.type === 'Bot'
              && comment.body?.includes(marker),
            );

            if (existingPrComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingPrComment.id,
                body: prBody,
              });
            }
            else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: prBody,
              });
            }

            const linkedIssueNumbers = new Set();
            for (const match of (pr.body || '').matchAll(/#(\d+)/g)) {
              linkedIssueNumbers.add(Number(match[1]));
            }
            const inferredArtifacts = inferArtifactsFromPrBody(pr.body || '');

            for (const issueNumber of linkedIssueNumbers) {
              const issueComments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                per_page: 100,
              });
              const existingIssueComment = issueComments.find(comment =>
                comment.user?.type === 'Bot'
                && comment.body?.includes(`${marker}:${pr.number}`),
              );
              const existingChecklistComment = issueComments.find(comment =>
                comment.user?.type === 'Bot'
                && comment.body?.includes(checklistMarker),
              );
              const issueBody = [
                `${marker}:${pr.number}`,
                `PR #${pr.number} was merged for this issue under \`${modeDisplay[matchedModeLabel]}\`.`,
                '',
                iterationRequired.has(matchedModeLabel)
                  ? 'Reminder: update `iteration-log.md` after release verification.'
                  : 'Reminder: update `iteration-log.md` if this merged change shipped or changed runtime behavior.',
              ].join('\n');

              if (existingIssueComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingIssueComment.id,
                  body: issueBody,
                });
              }
              else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: issueBody,
                });
              }

              if (existingChecklistComment && inferredArtifacts.size > 0) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingChecklistComment.id,
                  body: mergeChecklistBody(existingChecklistComment.body || '', inferredArtifacts),
                });
              }
            }

  issue_guardrails:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const issue = context.payload.issue;
            const labels = (issue.labels || []).map(label => label.name);
            const modePriority = ['legacy-maintenance', 'product-iteration', 'flash-launch'];
            const matchedModeLabel = modePriority.find(label => labels.includes(label));
            const kickoffMarker = '<!-- delivery-os-kickoff -->';
            const checklistMarker = '<!-- delivery-os-checklist -->';
            const modeDisplay = {
              'flash-launch': 'Flash Launch',
              'product-iteration': 'Product Iteration',
              'legacy-maintenance': 'Legacy Maintenance',
            };
            const requiredArtifacts = {
              'flash-launch': ['idea-brief', 'PRD', 'design-spec', 'implementation-plan', 'release-checklist'],
              'product-iteration': ['project-profile', 'PRD', 'design-spec', 'implementation-plan', 'task-breakdown', 'release-checklist', 'iteration-log'],
              'legacy-maintenance': ['project-profile', 'system-map', 'implementation-plan', 'task-breakdown', 'release-checklist'],
            };
            const optionalArtifacts = {
              'flash-launch': ['task-breakdown', 'iteration-log'],
              'product-iteration': ['idea-brief', 'system-map'],
              'legacy-maintenance': ['PRD', 'design-spec', 'iteration-log'],
            };
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100,
            });
            const existingKickoff = comments.find(comment =>
              comment.user?.type === 'Bot'
              && comment.body?.includes(kickoffMarker),
            );
            const existingChecklist = comments.find(comment =>
              comment.user?.type === 'Bot'
              && comment.body?.includes(checklistMarker),
            );

            function getCheckedSet(body) {
              const checked = new Set();
              for (const match of body.matchAll(/- \[x\] `([^`]+)`/g)) {
                checked.add(match[1]);
              }
              return checked;
            }

            function buildChecklistBody(modeLabel, previousBody = '') {
              const checked = getCheckedSet(previousBody);
              const required = requiredArtifacts[modeLabel] || [];
              const optional = optionalArtifacts[modeLabel] || [];

              const requiredLines = required.map(name => {
                const mark = checked.has(name) ? 'x' : ' ';
                return `- [${mark}] \`${name}\``;
              });

              const optionalLines = optional.map(name => {
                const mark = checked.has(name) ? 'x' : ' ';
                return `- [${mark}] \`${name}\``;
              });

              return [
                checklistMarker,
                `Delivery OS checklist for \`${modeDisplay[modeLabel]}\``,
                '',
                'Required artifacts:',
                ...requiredLines,
                '',
                'Optional artifacts:',
                ...optionalLines,
                '',
                'Update this checklist comment as the issue progresses. Existing checked items are preserved when labels change.',
              ].join('\n');
            }

            let body = '';

            if (!matchedModeLabel) {
              body = [
                kickoffMarker,
                'This issue is missing a Delivery OS mode label.',
                '',
                'Add one of these labels before implementation:',
                '- `flash-launch`',
                '- `product-iteration`',
                '- `legacy-maintenance`',
              ].join('\n');
            }
            else {
              const command = `pnpm kickoff:issue -- --repo ${context.repo.owner}/${context.repo.repo} --issue ${issue.number}`;
              body = [
                kickoffMarker,
                `Mode label detected: \`${matchedModeLabel}\``,
                '',
                'Use this command to generate the workspace for this issue:',
                '```bash',
                command,
                '```',
                'If you need to overwrite an existing workspace, append `--force`.',
              ].join('\n');
            }

            if (existingKickoff) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingKickoff.id,
                body,
              });
            }
            else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body,
              });
            }

            if (!matchedModeLabel) {
              return;
            }

            const checklistBody = buildChecklistBody(matchedModeLabel, existingChecklist?.body || '');

            if (existingChecklist) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingChecklist.id,
                body: checklistBody,
              });
            }
            else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: checklistBody,
              });
            }
